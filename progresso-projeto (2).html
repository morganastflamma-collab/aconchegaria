<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Progresso do Projeto</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    color: #1a1a1a;
    padding: 2rem;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #e8e8e8; }
    .label-text { color: #bbb !important; }
    .bar-bg { background: #3a3a3a !important; }
    .pct-sub { color: #bbb !important; }
  }
</style>
</head>
<body>

<div style="max-width: 680px; margin: 0 auto;">

  <div style="display: flex; gap: 24px; align-items: center; flex-wrap: wrap;">
    <div style="position: relative; width: 180px; height: 180px; flex-shrink: 0;">
      <canvas id="pizzaChart" width="180" height="180"></canvas>
      <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none;">
        <div style="font-size: 28px; font-weight: 500; line-height: 1;" id="pct-label">98%</div>
        <div class="pct-sub" style="font-size: 11px; color: #888; margin-top: 2px;">concluído</div>
      </div>
    </div>

    <div style="flex: 1; min-width: 200px;">
      <div id="phases" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const BRAND_PRIMARY   = '#5E1C22';
const BRAND_SECONDARY = '#A79B46';
const BRAND_MID       = '#7D4A32';
const EMPTY_LIGHT     = '#E8E4E4';
const EMPTY_DARK      = '#3a3a3a';

const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

const state = {
  phases: [
    { label: "Imersão de Marca",           pct: 100 },
    { label: "1 Ciclo - Direção Criativa",  pct: 100 },
    { label: "2 Ciclo - Identidade Visual", pct: 100 },
    { label: "3 Ciclo - Desdobramentos",    pct: 100 },
    { label: "Entrega Final",               pct: 90  },
  ]
};

function getColor(pct) {
  if (pct === 100) return BRAND_PRIMARY;
  if (pct >= 60)   return BRAND_MID;
  if (pct >= 30)   return BRAND_SECONDARY;
  return '#c0a0a0';
}

function overallPct() {
  return Math.round(state.phases.reduce((s, p) => s + p.pct, 0) / state.phases.length);
}

let chart;

function buildChart() {
  const pct = overallPct();
  const ctx = document.getElementById('pizzaChart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [pct, 100 - pct],
        backgroundColor: [BRAND_PRIMARY, isDark ? EMPTY_DARK : EMPTY_LIGHT],
        borderWidth: 0,
        borderRadius: 4,
        spacing: 2
      }]
    },
    options: {
      responsive: false,
      cutout: '72%',
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      animation: { duration: 400 }
    }
  });
  document.getElementById('pct-label').textContent = pct + '%';
}

function buildPhases() {
  const container = document.getElementById('phases');
  container.innerHTML = '';
  state.phases.forEach(p => {
    const color = getColor(p.pct);
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;';
    row.innerHTML = `
      <span class="label-text" style="font-size:12px;color:#888;width:165px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${p.label}">${p.label}</span>
      <div class="bar-bg" style="flex:1;height:6px;background:${isDark ? EMPTY_DARK : EMPTY_LIGHT};border-radius:4px;overflow:hidden;">
        <div style="width:${p.pct}%;height:100%;background:${color};border-radius:4px;transition:width .4s;"></div>
      </div>
      <span style="font-size:12px;font-weight:500;color:${color};width:32px;text-align:right;">${p.pct}%</span>
    `;
    container.appendChild(row);
  });
}

buildChart();
buildPhases();
</script>
</body>
</html>
